
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial 5</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img src="image.png" alt="train Image">
    <table>
        <!-- thead is about tables head part -->
        <!-- caption tag is used to give caption  -->
        <caption>Passenger's Data</caption>
        <!-- tr means table rows -->
        <!-- th means table heading -->
        <!-- td means table data -->

        <!-- in first tr add all headings -->
        <!-- we can add many td's tr -->
         <!-- tbody is about tables body part -->
        <tr>
            <!-- in th we use rowspan if we need -->
            <th>Name</th>
            <th>Age</th>
            <th>gender</th>
            <th>company</th>
            <th>language</th>
            <th>salary</th>
        </tr>

        <tr>
            <td>shubham</td>
            <td>20</td>
            <td>male</td>
            <td>microsoft</td>
            <td>python</td>
            <td>$20k</td>
        </tr>
        
        <tr>
            <td colspan="2">harris ali khan</td> 
            <!-- if harry's age is not known & we want his name to take two columns space then add colspan="2" -->
            <!-- <td>NA</td> -->
            <td>sigma</td>
            <td>apple</td>
            <td>javascript</td>
            <td>$40k</td>
        </tr>
        <!-- tfoot is about tables footer part  -->

    </table>

    <ul type="circle">
        <!-- types= disc(default) | square | circle -->
        <!-- ul means unordered list -->
        <li>Harry</li>
        <li>Rohan</li>
        <li>Shubham</li>
    </ul>
    
    <ol type="A">
        <!-- there are so many types available -->
        <!-- ol means ordered list -->
        <li>Harry</li>
        <li>Rohan</li>
        <li>Shubham</li>
    </ol>

    <dl>
        <!-- dl means definition list -->
        <!-- dt means definition terms -->
        <!-- dd means definition -->
         <dt>HTML</dt>
         <dd>Hyper Text Markup Language</dd>
         <dt>CSS</dt>
         <dd>Cascade style sheet</dd>
         <dt>JS</dt>
         <dd>JavaScript</dd>
    </dl>


    
    <script src="script.js"></script>
</body>
</html>
